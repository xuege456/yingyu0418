version: "3.9"

services:
  # PostgreSQL is now hosted on Neon (neon.tech)
  # Update DATABASE_URL in .env to your Neon connection string
  # Local Redis still needed for sessions/caching
  redis:
    image: redis:7-alpine
    container_name: english_training_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
    driver: local
