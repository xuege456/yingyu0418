<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - AI编程练功房</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd',
                            400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8',
                            800: '#1e40af', 900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex">
    <!-- Left Panel - Branding -->
    <div class="hidden lg:flex lg:w-1/2 gradient-bg relative overflow-hidden">
        <div class="absolute inset-0 opacity-20">
            <div class="absolute top-20 left-20 w-64 h-64 bg-white rounded-full blur-3xl"></div>
            <div class="absolute bottom-40 right-20 w-96 h-96 bg-purple-300 rounded-full blur-3xl"></div>
        </div>

        <div class="relative z-10 flex flex-col justify-center px-16 text-white">
            <a href="index.html" class="flex items-center gap-3 mb-16">
                <div class="w-12 h-12 rounded-xl bg-white/20 backdrop-blur flex items-center justify-center">
                    <i class="fas fa-language text-2xl"></i>
                </div>
                <span class="font-bold text-2xl">AI编程练功房</span>
            </a>

            <h1 class="text-4xl lg:text-5xl font-bold leading-tight mb-6">
                开始你的<br>
                英语提升之旅
            </h1>
            <p class="text-xl text-blue-100 mb-12 leading-relaxed">
                加入 thousands of learners<br>
                一起高效提升英语能力
            </p>

            <div class="space-y-6">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-white/10 backdrop-blur flex items-center justify-center">
                        <i class="fas fa-bolt text-xl"></i>
                    </div>
                    <div>
                        <div class="font-semibold">免费开始</div>
                        <div class="text-sm text-blue-200">每日免费练习额度</div>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-white/10 backdrop-blur flex items-center justify-center">
                        <i class="fas fa-shield-alt text-xl"></i>
                    </div>
                    <div>
                        <div class="font-semibold">数据安全</div>
                        <div class="text-sm text-blue-200">你的学习数据安全加密</div>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-white/10 backdrop-blur flex items-center justify-center">
                        <i class="fas fa-headset text-xl"></i>
                    </div>
                    <div>
                        <div class="font-semibold">7x24 支持</div>
                        <div class="text-sm text-blue-200">随时解答你的问题</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="absolute bottom-8 left-16 text-sm text-blue-200">
            © 2024 AI编程练功房. All rights reserved.
        </div>
    </div>

    <!-- Right Panel - Register Form -->
    <div class="flex-1 flex items-center justify-center p-8">
        <div class="w-full max-w-md">
            <!-- Mobile Logo -->
            <div class="lg:hidden flex items-center justify-center gap-2 mb-8">
                <div class="w-10 h-10 rounded-xl gradient-bg flex items-center justify-center">
                    <i class="fas fa-language text-white text-lg"></i>
                </div>
                <span class="font-bold text-xl">AI编程练功房</span>
            </div>

            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold text-gray-900 mb-2">创建账户</h2>
                <p class="text-gray-600">完成注册，即刻开始免费练习</p>
            </div>

            <!-- Progress Steps -->
            <div class="flex items-center justify-center gap-4 mb-8">
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded-full bg-primary-600 text-white flex items-center justify-center text-sm font-medium">1</div>
                    <span class="ml-2 text-sm font-medium text-primary-600">验证邮箱</span>
                </div>
                <div class="w-12 h-px bg-gray-300"></div>
                <div class="flex items-center text-gray-400">
                    <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-sm font-medium">2</div>
                    <span class="ml-2 text-sm">完善资料</span>
                </div>
                <div class="w-12 h-px bg-gray-300"></div>
                <div class="flex items-center text-gray-400">
                    <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-sm font-medium">3</div>
                    <span class="ml-2 text-sm">开始练习</span>
                </div>
            </div>

            <!-- Register Form -->
            <form class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">昵称</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-user text-gray-400"></i>
                        </div>
                        <input type="text" placeholder="你希望我们怎么称呼你"
                               class="w-full pl-12 pr-4 py-3 rounded-xl border-2 border-gray-200 focus:border-primary-400 focus:ring-4 focus:ring-primary-100 outline-none transition-all"
                               value="李明">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">邮箱地址</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-envelope text-gray-400"></i>
                        </div>
                        <input type="email" placeholder="your@email.com"
                               class="w-full pl-12 pr-4 py-3 rounded-xl border-2 border-gray-200 focus:border-primary-400 focus:ring-4 focus:ring-primary-100 outline-none transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400"></i>
                        </div>
                        <input type="password" placeholder="至少 8 位字符"
                               class="w-full pl-12 pr-12 py-3 rounded-xl border-2 border-gray-200 focus:border-primary-400 focus:ring-4 focus:ring-primary-100 outline-none transition-all">
                        <button type="button" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <!-- Password Strength -->
                    <div class="mt-2">
                        <div class="flex items-center gap-1">
                            <div class="h-1 flex-1 rounded-full bg-green-500"></div>
                            <div class="h-1 flex-1 rounded-full bg-green-500"></div>
                            <div class="h-1 flex-1 rounded-full bg-yellow-400"></div>
                            <div class="h-1 flex-1 rounded-full bg-gray-200"></div>
                        </div>
                        <p class="text-xs text-yellow-600 mt-1">密码强度: 中等 - 建议包含数字和特殊字符</p>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">确认密码</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400"></i>
                        </div>
                        <input type="password" placeholder="再次输入密码"
                               class="w-full pl-12 pr-4 py-3 rounded-xl border-2 border-gray-200 focus:border-primary-400 focus:ring-4 focus:ring-primary-100 outline-none transition-all">
                    </div>
                </div>

                <div class="flex items-start gap-2">
                    <input type="checkbox" class="w-4 h-4 rounded border-gray-300 text-primary-600 focus:ring-primary-500 mt-0.5">
                    <span class="text-sm text-gray-600">
                        我已阅读并同意 <a href="#" class="text-primary-600 hover:underline">服务条款</a> 和 <a href="#" class="text-primary-600 hover:underline">隐私政策</a>
                    </span>
                </div>

                <button type="button" onclick="window.location.href='login.html'" class="w-full py-3.5 rounded-xl bg-gradient-to-r from-blue-600 to-purple-600 text-white font-semibold hover:shadow-lg hover:-translate-y-0.5 transition-all">
                    注册
                </button>
            </form>

            <!-- Divider -->
            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 bg-gray-50 text-gray-500">或</span>
                </div>
            </div>

            <!-- Social Register -->
            <div class="space-y-3">
                <button class="w-full flex items-center justify-center gap-3 px-4 py-3 rounded-xl border-2 border-gray-200 hover:border-gray-300 hover:bg-gray-50 transition-all">
                    <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    <span class="font-medium text-gray-700">使用 Google 注册</span>
                </button>
            </div>

            <p class="mt-8 text-center text-gray-600">
                已有账户？
                <a href="login.html" class="text-primary-600 hover:text-primary-700 font-semibold">立即登录</a>
            </p>
        </div>
    </div>
</body>
</html>
